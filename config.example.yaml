# ============================================
# Article Tracker 统一配置文件（模板）
# 复制为 config.yaml 后自定义
# ============================================

# ---------- arXiv 预印本源 ----------
arxiv:
  enabled: true                                    # 是否启用 arXiv 源
  categories: ["cs.CV", "cs.AI", "cs.LG", "cs.CL"] # arXiv 学科分类
  keywords:                                        # 搜索关键词（与 categories 取 AND/OR）
    - "diffusion model"
    - "vision-language"
    - "segmentation"
    - "deep learning"
    - "large language model"
  exclude_keywords:                                # 排除关键词
    - "survey"
    - "review"
  logic: "AND"                                     # 关键词逻辑：AND / OR
  max_results: 50                                  # 最大返回论文数
  sort_by: "submittedDate"                         # 排序字段：submittedDate / lastUpdatedDate
  sort_order: "descending"                         # 排序方向：descending / ascending

# ---------- 顶刊正式论文源（Semantic Scholar 主搜索） ----------
top_journal:
  enabled: true                                    # 是否启用顶刊源
  since_days: 7                                    # 回溯天数（1=仅当天）
  max_per_journal: 50                              # 每个期刊最大返回数
  watchlist:                                       # 追踪的期刊家族（内联，无需单独文件）
    ## Nature 家族
    - name: "Nature"
    - name: "Nature Communications"
    - name: "Nature Climate Change"
    - name: "Nature Ecology & Evolution"
    - name: "Nature Methods"
    - name: "Nature Geoscience"
    - name: "Nature Machine Intelligence"
    - name: "Nature Sustainability"
    ## Science 家族
    - name: "Science"
    - name: "Science Advances"
    - name: "Science Robotics"
    ## Cell 家族
    - name: "Cell"
    - name: "Nature Cell Biology"
    ## PNAS
    - name: "Proceedings of the National Academy of Sciences"
    ## 其他顶刊
    - name: "The Lancet"
    - name: "New England Journal of Medicine"
    - name: "JAMA"
    - name: "BMJ"

# ---------- 去重策略 ----------
dedup:
  seen_path: ".state/seen.json"                    # 去重状态文件（会提交到仓库，跨次持久化）
  title_threshold: 0.85                            # 标题模糊匹配阈值（0~1，越大越严格）
  prefer_source: "top_journal"                     # 同一篇论文优先保留哪个源的版本

# ---------- 筛选策略（四层分类） ----------
screening:
  output_tiers: ["core", "proxy", "eco"]           # 输出哪些层级（noise 不输出）
  core_keywords:
    - "deep learning"
    - "computer vision"
    - "natural language processing"
    - "large language model"
    - "diffusion model"
    - "vision-language"
  proxy_keywords:
    - "representation learning"
    - "self-supervised learning"
    - "contrastive learning"
    - "generative model"
    - "reinforcement learning"
    - "graph neural network"
  eco_keywords:
    - "optimization"
    - "Bayesian inference"
    - "causal inference"
    - "federated learning"
    - "neural architecture search"
    - "knowledge distillation"
  exclusion_keywords:
    - "survey"
    - "review"
  must_track_journals:
    - "Nature"
    - "Science"
    - "Cell"

# ---------- LLM 双语摘要 ----------
llm:
  enabled: false                                   # 是否启用 LLM（需配 API Key）
  base_url: ""                                     # OpenAI 兼容 API 地址
  model: ""
  api_key_env: "DS_API_KEY"
  api_key: ""
  system_prompt_zh: ""
  system_prompt_en: ""
  timeout: 60

# ---------- 输出通道（九通道，每通道独立开关） ----------
output:
  dir: "outputs"
  json_enabled: true
  md_enabled: true
  pdf_enabled: false
  excel_enabled: false
  html_table_enabled: true
  obsidian_enabled: false
  obsidian_vault: ""
  zotero_enabled: false
  email:
    enabled: false
    sender: ""
    to: []
    smtp_server: ""
    smtp_port: 465
    smtp_user: ""
    smtp_pass_env: "SMTP_PASS"
    smtp_pass: ""
    tls_mode: "auto"
    subject_prefix: "Paper Tracker"
  ghpages:
    enabled: false
    output_dir: "docs"
    keep_runs: 30
    accent: "#2563eb"
    theme_mode: "auto"

# ---------- 调度 ----------
schedule:
  enabled: false
  cron: "30 1 * * *"
  timezone: "Asia/Shanghai"

# ---------- 新鲜度与回退 ----------
freshness:
  since_days: 7
  max_age_days: 365
  fallback_when_empty: false
  fallback_top_n: 10

# ---------- 外部 API 配置 ----------
s2:
  api_key_env: "S2_API_KEY"
  api_key: ""
  base_url: "https://api.semanticscholar.org/graph/v1"
openalex:
  email_env: "OPENALEX_EMAIL"
  email: ""
  base_url: "https://api.openalex.org"

# ---------- 运行参数 ----------
source_filter: "all"
dry_run: false
verbose: false
